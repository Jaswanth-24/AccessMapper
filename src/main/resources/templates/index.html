<!DOCTYPE html>
<html>
<head>
    <title>GitHub Access Mapper</title>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family:Arial, sans-serif;
            background:#f4f6f8;
        }

        .container{
            text-align:center;
        }

        button{
            padding:12px 24px;
            font-size:16px;
            border:none;
            border-radius:6px;
            background-color:#24292e;
            color:white;
            cursor:pointer;
        }

        button:hover{
            background-color:#444;
        }
    </style>

</head>

<body>

<div class="container">

    <h2>GitHub Access Mapper</h2>

    <a href="/oauth2/authorization/github">
        <button>Sign in with GitHub</button>
    </a>

</div>

</body>
</html>
